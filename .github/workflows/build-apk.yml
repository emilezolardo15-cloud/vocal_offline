name: Flutter APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. On passe à Java 17 (Indispensable pour Flutter 3.19+)
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 2. On installe Flutter 3.19.6 sans cache pour éviter les vieux résidus
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: false

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release
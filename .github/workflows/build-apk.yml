name: Flutter APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          cache: false

      # On force l'installation en désactivant les alertes de blocage
      - name: Install dependencies
        run: flutter pub get
        env:
          FLUTTER_SUPPRESS_ANALYTICS: true

      # Étape de build avec l'argument magique pour ignorer les erreurs d'embedding
      - name: Build APK
        run: flutter build apk --release --no-pub